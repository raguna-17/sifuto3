
services:
  db:
    image: postgres:16
    container_name: ec-db
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yuuzaa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build: .
    container_name: ec-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    

volumes:
  postgres_data: